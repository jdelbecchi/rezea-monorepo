version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: rezea_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rezea}
      POSTGRES_USER: ${POSTGRES_USER:-rezea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rezea}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rezea_network
    # Tuning pour VPS low-cost
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "effective_cache_size=1GB"

  # FastAPI Backend
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: rezea_api_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rezea}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rezea}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAILERSEND_API_KEY: ${MAILERSEND_API_KEY}
      HELLOASSO_CLIENT_ID: ${HELLOASSO_CLIENT_ID}
      HELLOASSO_CLIENT_SECRET: ${HELLOASSO_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rezea_network
    command: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  # Nginx Reverse Proxy + Static Files
  nginx:
    image: nginx:alpine
    container_name: rezea_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../apps/web/out:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rezea_network

volumes:
  postgres_data:
  nginx_cache:

networks:
  rezea_network:
    driver: bridge
